<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Hospital</title>
    <!-- Modern Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Premium Custom Styles -->
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <!-- Glassmorphic Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav mb-5 py-3 sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold fs-4 d-flex align-items-center" href="/">
          <i class="bi bi-hospital me-2 fs-3 text-info"></i>
          <span>Smart<span class="text-info">Hospital</span></span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-4">
            <li class="nav-item">
              <a class="nav-link fw-medium px-3" href="/book"><i class="bi bi-calendar-plus me-1"></i> Book Appointment</a>
            </li>
            <li class="nav-item">
              <a class="nav-link fw-medium px-3" href="/admin"><i class="bi bi-shield-lock me-1"></i> Admin Portal</a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto align-items-lg-center">
            {% if current_user %}
              <li class="nav-item me-3">
                <span class="nav-link text-light d-flex align-items-center">
                  <i class="bi bi-person-circle fs-5 me-2"></i>
                  <span class="fw-medium">{{ current_user.email }}</span>
                </span>
              </li>
              {% if patient %}
              <li class="nav-item"><a class="btn btn-outline-info btn-sm rounded-pill fw-bold px-3 me-2" href="/patient/dashboard">Dashboard</a></li>
              {% elif doctor %}
              <li class="nav-item"><a class="btn btn-outline-info btn-sm rounded-pill fw-bold px-3 me-2" href="/doctor/dashboard">Dashboard</a></li>
              {% endif %}
              <li class="nav-item">
                <a class="btn btn-danger btn-sm rounded-pill fw-bold px-3 shadow-none" href="/logout"><i class="bi bi-box-arrow-right"></i></a>
              </li>
            {% else %}
              <li class="nav-item">
                <a class="btn btn-light rounded-pill px-4 fw-bold text-primary shadow-sm" href="/login">Log In / Sign Up</a>
              </li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>
    
    <!-- Main Content Container with bottom padding -->
    <main class="container pb-5">
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
    
    <script>
      // Add simple initialization logic for tooltips, fade in, etc if needed.
    </script>
  </body>
</html>
