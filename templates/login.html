{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <h3 class="card-title text-center mb-4">Smart Hospital Login</h3>
        
        {% if error %}
          <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endif %}

        <ul class="nav nav-tabs mb-3" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="patient-tab" data-bs-toggle="tab" data-bs-target="#patient-login" type="button">Patient Login</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="doctor-tab" data-bs-toggle="tab" data-bs-target="#doctor-login" type="button">Doctor Login</button>
          </li>
        </ul>

        <div class="tab-content">
          <!-- Patient Login Tab -->
          <div class="tab-pane fade show active" id="patient-login" role="tabpanel">
            <form method="POST" action="/login/patient">
              <div class="mb-3">
                <label for="patient-email" class="form-label">Email</label>
                <input type="email" class="form-control" id="patient-email" name="email" required>
              </div>
              <div class="mb-3">
                <label for="patient-password" class="form-label">Password</label>
                <input type="password" class="form-control" id="patient-password" name="password" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <div class="text-center mt-3">
              <p>Don't have an account? <a href="/signup/patient">Sign up as Patient</a></p>
            </div>
          </div>

          <!-- Doctor Login Tab -->
          <div class="tab-pane fade" id="doctor-login" role="tabpanel">
            <form method="POST" action="/login/doctor">
              <div class="mb-3">
                <label for="doctor-email" class="form-label">Email</label>
                <input type="email" class="form-control" id="doctor-email" name="email" required>
              </div>
              <div class="mb-3">
                <label for="doctor-password" class="form-label">Password</label>
                <input type="password" class="form-control" id="doctor-password" name="password" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <div class="text-center mt-3">
              <p>Don't have an account? <a href="/signup/doctor">Sign up as Doctor</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
