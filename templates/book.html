{% extends 'base.html' %}
{% block content %}
<div class="row min-vh-75 py-4 fade-in-up">
  <div class="col-12 col-lg-8 mx-auto">
    <div class="glass-card shadow-lg border-primary border-top border-4 delay-1">
      
      <div class="d-flex align-items-center mb-4 pb-3 border-bottom">
        <div class="bg-primary bg-gradient text-white rounded-circle p-3 me-3 shadow-sm d-flex justify-content-center align-items-center" style="width: 60px; height: 60px;">
          <i class="bi bi-calendar2-plus fs-3"></i>
        </div>
        <div>
          <h2 class="fw-bolder mb-0 text-dark">Book Appointment</h2>
          <p class="text-muted mb-0">Fill in your details and select symptoms</p>
        </div>
      </div>

      <form id="bookingForm" class="row g-4 px-2">
        <div class="col-md-6">
          <div class="form-floating">
            <input class="form-control" name="name" id="bookName" placeholder="Full Name" required>
            <label for="bookName"><i class="bi bi-person me-1"></i> Full Name</label>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-floating">
            <input class="form-control" name="phone" id="bookPhone" placeholder="Phone" required>
            <label for="bookPhone"><i class="bi bi-telephone me-1"></i> Phone</label>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-floating">
            <input class="form-control" name="email" id="bookEmail" placeholder="Email">
            <label for="bookEmail"><i class="bi bi-envelope me-1"></i> Email</label>
          </div>
        </div>

        <div class="col-12 mt-4">
          <h5 class="fw-bold mb-3"><i class="bi bi-clipboard2-pulse text-danger me-2"></i>What are your symptoms?</h5>
          <div id="symptomsList" class="d-flex flex-wrap gap-2 p-3 bg-light rounded-3 border">
            {% for s in symptoms %}
              <input type="checkbox" class="btn-check" value="{{ s.id }}" id="sym{{ s.id }}" autocomplete="off">
              <label class="btn btn-outline-primary rounded-pill px-3 fw-medium" for="sym{{ s.id }}">{{ s.name|title }}</label>
            {% endfor %}
          </div>
        </div>

        <div class="col-md-5 mt-4">
          <h5 class="fw-bold mb-3"><i class="bi bi-calendar-event text-primary me-2"></i>Preferred Date</h5>
          <input type="date" class="form-control form-control-lg border-primary text-primary fw-bold" id="dateInput" name="date" required>
        </div>

        <div class="col-12 mt-4 text-end">
          <button type="button" id="recommendBtn" class="btn btn-primary bg-gradient btn-lg rounded-pill px-5 py-3 shadow">
            <i class="bi bi-magic me-2"></i> Get Recommendations
          </button>
        </div>

        <div class="col-12 mt-5" id="recommendations">
          <!-- Dynamic JS content renders here -->
        </div>
      </form>
      
    </div>
  </div>
</div>
{% endblock %}
