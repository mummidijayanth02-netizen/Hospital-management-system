{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-75 py-5 fade-in-up">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="glass-card mt-3 delay-1">
      <div class="text-center mb-4">
        <i class="bi bi-person-heart text-primary align-middle" style="font-size: 2.5rem;"></i>
        <h2 class="fw-bold mt-2">Patient Registration</h2>
        <p class="text-muted">Create your secure health profile</p>
      </div>

      {% if error %}
      <div class="alert alert-danger border-0 shadow-sm rounded-3 fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
      </div>
      {% endif %}

      <form action="/signup/patient" method="POST" class="needs-validation">
        
        <div class="row mb-3">
          <div class="col-12 col-md-6 mb-3 mb-md-0">
            <div class="form-floating">
              <input type="text" class="form-control" name="name" id="name" placeholder="John Doe" required>
              <label for="name"><i class="bi bi-person me-1"></i> Full Name</label>
            </div>
          </div>
          <div class="col-12 col-md-6">
            <div class="form-floating">
              <input type="tel" class="form-control" name="phone" id="phone" placeholder="1234567890" required>
              <label for="phone"><i class="bi bi-telephone me-1"></i> Phone Number</label>
            </div>
          </div>
        </div>

        <div class="form-floating mb-3">
          <input type="email" class="form-control" name="email" id="email" placeholder="name@example.com" required>
          <label for="email"><i class="bi bi-envelope me-1"></i> Email address</label>
        </div>

        <div class="row mb-4">
          <div class="col-12 col-md-6 mb-3 mb-md-0">
            <div class="form-floating">
              <input type="password" class="form-control" name="password" id="password" placeholder="Password" required>
              <label for="password"><i class="bi bi-key me-1"></i> Password</label>
            </div>
          </div>
          <div class="col-12 col-md-6">
            <div class="form-floating">
              <input type="password" class="form-control" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required>
              <label for="confirm_password"><i class="bi bi-key-fill me-1"></i> Confirm Password</label>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fs-5 mb-3 fw-bold shadow">Create Account</button>
        
        <div class="text-center mt-3">
          <span class="text-muted">Already have an account?</span>
          <a href="/login" class="text-decoration-none fw-bold text-primary ms-1">Login here</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
